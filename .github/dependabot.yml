# Dependabot — JobbPilot
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Tre ecosystems:
# - npm (hanterar även pnpm — package.json + pnpm-lock.yaml)
# - nuget (vilande tills .NET-scaffold landar i Fas 0/1)
# - github-actions (vilande tills workflows skapas, senare STEG)
#
# Strategi: månadsvisa version-updates, grupperade per ecosystem för att minska
# PR-brus. Security updates körs separat och ignorerar schedule (GitHub-default).

version: 2

updates:
  # Root package.json (Husky-anchor; utökas när web/jobbpilot-web/ scaffoldas)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-all:
        patterns:
          - "*"

  # NuGet — vilande tills .csproj finns
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    groups:
      nuget-all:
        patterns:
          - "*"

  # GitHub Actions — vilande tills workflows skapas
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions-all:
        patterns:
          - "*"
