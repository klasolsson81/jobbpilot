# Deploy till dev-miljön (STEG 14a, BUILD.md §15.3 / §15.4).
#
# Trigger: tag matchande v*-dev (t.ex. v0.1.0-dev). Tag måste pushas på `main`-
# branch (Git refererar tags till commits, inte branches — men deploy-rollens
# OIDC trust-policy accepterar bara taggar oavsett branch-historik). Andra
# tag-mönster (v*-rc*, v* utan suffix) hanteras av framtida deploy-staging.yml
# / deploy-prod.yml när respektive miljö-stack existerar.
#
# Pipeline:
#   1. OIDC assume → kortlivad AWS-session via dev-deploy-rollen
#   2. Bygg + push api-image till ECR (taggar: $GITHUB_SHA + $GITHUB_REF_NAME)
#   3. Bygg + push worker-image likt ovan
#   4. Render task-defs med nya image-URIs och register nya revisions
#   5. UpdateService på api + worker
#   6. Wait for api-stability (60% av timeout) + smoke-test https://dev.jobbpilot.se
#   7. Worker-stability accepteras inte fail:a workflowen tills 14b sätter creds
#      (PLACEHOLDER-creds gör Worker till restart-loop tills DDL kör).
name: deploy-dev

on:
  push:
    tags:
      - 'v*-dev'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git-tag att deploya (måste matcha v*-dev). T.ex. v0.1.0-dev.'
        required: true
        type: string

# OIDC kräver id-token: write. contents: read för checkout.
permissions:
  id-token: write
  contents: read

# Ingen samtidig deploy till dev — om en deploy pågår avbryts inte den, men
# nya runs kö:as. Förhindrar race-conditions där två rolling-deploys konkurrerar
# om samma ECS-service.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  AWS_REGION: eu-north-1
  AWS_ACCOUNT_ID: '710427215829'
  ECR_REGISTRY: 710427215829.dkr.ecr.eu-north-1.amazonaws.com
  ECS_CLUSTER: jobbpilot-dev-cluster
  ECS_SERVICE_API: jobbpilot-dev-api
  ECS_SERVICE_WORKER: jobbpilot-dev-worker
  TASK_FAMILY_API: jobbpilot-dev-api
  TASK_FAMILY_WORKER: jobbpilot-dev-worker
  TASK_FAMILY_MIGRATE: jobbpilot-dev-migrate
  # Container-namn matchar ECS task-def container-definitions.name.
  # Sätts till "api" / "worker" / "migrate" i modules/ecs/main.tf (inte name_prefix:ade).
  CONTAINER_NAME_API: api
  CONTAINER_NAME_WORKER: worker
  CONTAINER_NAME_MIGRATE: migrate
  SMOKE_URL: https://dev.jobbpilot.se/api/ready

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Resolve tag-name (push-tag-event eller workflow_dispatch-input).
      # GITHUB_REF_NAME är "v0.1.0-dev" vid tag-push. workflow_dispatch.inputs.tag
      # är required: true så vi vet att den finns vid manuell trigger.
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            echo "Unable to resolve tag (inte tag-trigger och inte workflow_dispatch)"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # 15 min räcker för deploy + smoke-test. Kort blast-radius vid
          # runner-kompromiss. Rollens max_session_duration är 1h som tak,
          # session-livslängd här (15 min) är striktare.
          role-duration-seconds: 900

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ------------------------------------------------------------------
      # Build + push images
      # ------------------------------------------------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/JobbPilot.Api/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/jobbpilot-dev-api:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/jobbpilot-dev-api:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build + push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/JobbPilot.Worker/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/jobbpilot-dev-worker:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/jobbpilot-dev-worker:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      # Migrate-image byggs vid varje deploy så att en re-körd Migrate-task
      # (one-shot, manuell via `aws ecs run-task`) alltid får senaste connection-
      # string-logik och Dockerfile-state. Migrate är inte en service — workflow
      # bara registerar ny task-def-revision; faktiskt körning görs manuellt
      # vid TD-38 TLS-rotation, schema-mutation eller secret-rotation
      # (se docs/runbooks/td-38-tls-apply.md).
      - name: Build + push Migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/JobbPilot.Migrate/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/jobbpilot-dev-migrate:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/jobbpilot-dev-migrate:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate

      # ------------------------------------------------------------------
      # Update task-defs + services
      #
      # Pattern: hämta senaste rev:n från AWS, render image-byte, register
      # ny rev via deploy-task-definition-action. Inga task-def-mallar i repo
      # — Terraform äger task-def-skapande, GitHub Actions muterar bara
      # image-fältet vid deploy. Detta håller IaC som single source of truth
      # för CPU/memory/secrets/env och låter pipelinen vara image-only.
      # ------------------------------------------------------------------

      - name: Fetch current API task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY_API" \
            --query 'taskDefinition' \
            --output json > task-def-api.json

      - name: Render API task-def
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-api.json
          container-name: ${{ env.CONTAINER_NAME_API }}
          image: ${{ env.ECR_REGISTRY }}/jobbpilot-dev-api:${{ github.sha }}

      - name: Deploy API service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_API }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Fetch current Worker task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY_WORKER" \
            --query 'taskDefinition' \
            --output json > task-def-worker.json

      - name: Render Worker task-def
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-worker.json
          container-name: ${{ env.CONTAINER_NAME_WORKER }}
          image: ${{ env.ECR_REGISTRY }}/jobbpilot-dev-worker:${{ github.sha }}

      # Worker accepterar instabilitet under STEG 14a-fönstret. PLACEHOLDER-
      # creds gör Worker till restart-loop tills 14b sätter riktiga values.
      # wait-for-service-stability: false → workflow fail:ar inte på worker.
      - name: Deploy Worker service (no-wait)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_WORKER }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Worker stability warning
        run: |
          echo "::warning::Worker-deploy verifierar inte runtime-stability i 14a (PLACEHOLDER-creds). 14b sätter creds + aktiverar wait-for-service-stability."

      # ------------------------------------------------------------------
      # Migrate task-def — register only (ingen service, ingen auto-run).
      # Workflow uppdaterar revision-pekaren till ny image; faktisk run-task
      # görs manuellt vid TLS-rotation eller schema-mutation (TD-38, TD-47).
      # ------------------------------------------------------------------

      - name: Fetch current Migrate task-def
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY_MIGRATE" \
            --query 'taskDefinition' \
            --output json > task-def-migrate.json

      - name: Render Migrate task-def
        id: render-migrate
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def-migrate.json
          container-name: ${{ env.CONTAINER_NAME_MIGRATE }}
          image: ${{ env.ECR_REGISTRY }}/jobbpilot-dev-migrate:${{ github.sha }}

      # Migrate har ingen service → amazon-ecs-deploy-task-definition fungerar inte
      # (kräver service-name). Använd aws ecs register-task-definition direkt.
      # Run-task triggas manuellt via docs/runbooks/td-38-tls-apply.md.
      - name: Register Migrate task-def
        id: register-migrate
        run: |
          MIGRATE_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "file://${{ steps.render-migrate.outputs.task-definition }}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "migrate-task-def-arn=$MIGRATE_TASK_ARN" >> "$GITHUB_OUTPUT"
          echo "Migrate task-def registered: $MIGRATE_TASK_ARN"

      # ------------------------------------------------------------------
      # Smoke-test
      # ------------------------------------------------------------------

      - name: Smoke-test (HTTPS + HSTS)
        run: |
          echo "Smoke-test mot $SMOKE_URL ..."
          set -e

          # Retry med backoff — ALB target-group health-check kan ta upp till 30s
          # extra efter ECS-deployment-completed innan målgrupp-status uppdaterats.
          for attempt in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -s -o /tmp/body -w "%{http_code}" "$SMOKE_URL" || echo "000")
            if [[ "$HTTP_STATUS" == "200" ]]; then
              echo "OK: HTTP 200 efter $attempt försök"
              cat /tmp/body
              break
            fi
            echo "Attempt $attempt: HTTP $HTTP_STATUS — väntar 10s..."
            sleep 10
            if [[ "$attempt" == "5" ]]; then
              echo "Smoke-test FAIL efter 5 försök"
              exit 1
            fi
          done

          # Verifiera HSTS-header sätts på response (regression-skydd för
          # ADR 0027 / TD-33).
          HSTS=$(curl -sI "$SMOKE_URL" | grep -i "strict-transport-security" || true)
          if [[ -z "$HSTS" ]]; then
            echo "FAIL: Strict-Transport-Security-header saknas"
            exit 1
          fi
          echo "HSTS verifierad: $HSTS"

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **API image:** \`$ECR_REGISTRY/jobbpilot-dev-api:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Worker image:** \`$ECR_REGISTRY/jobbpilot-dev-worker:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Migrate image:** \`$ECR_REGISTRY/jobbpilot-dev-migrate:${{ github.sha }}\` (register-only, run manually)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Smoke-URL:** $SMOKE_URL" >> "$GITHUB_STEP_SUMMARY"
