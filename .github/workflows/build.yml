# Build + test pipeline (STEG 14a, BUILD.md §15.3).
#
# Kör på push till main + alla PRs. Inga AWS-anrop, inga deploys — ren CI-
# validering. Deploy hanteras separat via deploy-dev.yml (tag-trigger).
#
# Backend + frontend körs som parallella jobs för snabb fail-fast.
name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Ren read-only — inga federation-tokens behövs i build-workflowen.
permissions:
  contents: read

# Avbryt äldre runs vid ny push på samma ref (sparar minutes på dependabot-PRs).
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (.NET 10)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # global.json låser till 10.0.200 (rollForward latestFeature). setup-dotnet
      # respekterar global.json om version inte angivs explicit.
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore JobbPilot.sln

      - name: Build
        run: dotnet build JobbPilot.sln --no-restore -c Release

      # Microsoft.Testing.Platform-runner aktiveras via global.json.
      #
      # .NET 10 SDK 10.0.201 kräver `--solution`-flag specifikt för `dotnet
      # test` när sln-fil inputas (inte för restore/build — där är positional
      # OK). Default test-output går till stdout — räcker för CI-feedback.
      # När test-failures behöver djupare analys: lägg till MTPlatform-native
      # `-- --report-trx`-flagga, men håll det enkelt för Fas 0.
      #
      # ASPNETCORE_ENVIRONMENT=Development tvingar test-host till dev-env oavsett
      # runner-default. Production-env tripper ForwardedHeadersConfig.EnsureSafe-
      # ForEnvironment (Sec-Major-1, STEG 12) eftersom test-fixturer inte har
      # proxy-CIDR:er. Production-startup-pipeline verifieras i isolation av
      # ProductionStartupSmokeTests som override:ar till "Production" + populerad
      # KnownNetworks via Environment.SetEnvironmentVariable inom sin egen factory.
      # Försök att sätta env-var inom ApiFactory.InitializeAsync hade ingen effekt
      # på Linux-runner (.NET 10 / WebApplicationFactory-quirk) — runner-level
      # env-var är ground truth.
      - name: Test
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: dotnet test --solution JobbPilot.sln --no-build -c Release

  # Coverage-mätning + blockerande regressions-gate (ADR 0044, Accepted
  # 2026-05-17). Per-lager icke-regression-ratchet — golv = floor(uppmätt
  # baseline − 2.0pp), pinnade av senior-cto-advisor mot baseline @ HEAD
  # 98b6f17. Det snabba backend-jobbet rörs inte (fast fail-feedback
  # bevaras); detta kör parallellt och ligger i ci.needs.
  coverage:
    name: coverage (.NET 10)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Coverage (test + ReportGenerator, first-party-filtrerad)
        run: bash scripts/coverage.sh

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: artifacts/coverage
          retention-days: 14

      # GATE-MEKANISM (ADR 0044 Accepted — enforce:ad, blockerande via
      # ci.needs). Per-lager-golv = floor(uppmätt baseline − 2.0pp),
      # pinnade av senior-cto-advisor 2026-05-17 mot baseline @ HEAD
      # 98b6f17 (Domain 95.3/93.3, Application 97.7/91.1, Infrastructure
      # 84.0, Api 93.7). Ratchet: höjs manuellt vid Klas-GO när coverage
      # stabilt ligger högre — non-regression, ej target (Fowler/Goodhart,
      # ADR 0044 Beslut 4). Branch-gate endast Domain+Application (de
      # invariant-bärande lagren, CLAUDE.md §2.4). Worker observe-only
      # Fas 1; Migrate exkluderad (assembly-filtrerad). Ingen global- eller
      # method-gate (redundant/Goodhart-yta — CTO-beslut). jq finns
      # förinstallerat på ubuntu-runners (ingen ny supply-chain-yta).
      - name: Coverage gate (ADR 0044 — per-lager icke-regression-ratchet)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          summary=artifacts/coverage/Summary.json
          fail=0

          check() {
            local asm=$1 metric=$2 floor=$3 val
            val=$(jq -r --arg a "$asm" --arg m "$metric" \
              '.coverage.assemblies[] | select(.name==$a) | .[$m]' "$summary")
            if [[ -z "$val" || "$val" == "null" ]]; then
              echo "::error::Coverage-gate: assembly '$asm' saknas i Summary.json (metric=$metric) — fail-loud"
              fail=1
              return
            fi
            if awk "BEGIN{exit !($val < $floor)}"; then
              echo "::error::Coverage-regression: $asm $metric=$val% < golv $floor%"
              fail=1
            else
              echo "OK   $asm $metric=$val% (golv $floor%)"
            fi
          }

          # Line-golv: Domain/Application/Infrastructure/Api.
          check JobbPilot.Domain         coverage        93
          check JobbPilot.Application    coverage        95
          check JobbPilot.Infrastructure coverage        82
          check JobbPilot.Api            coverage        91
          # Branch-golv: endast Domain + Application (invariant-bärande).
          check JobbPilot.Domain         branchcoverage  91
          check JobbPilot.Application    branchcoverage  89

          # Worker: observe-only Fas 1 (ADR 0044 Beslut 4/5) — log, gejta ej.
          worker=$(jq -r '.coverage.assemblies[] | select(.name=="JobbPilot.Worker") | .coverage' "$summary")
          echo "INFO JobbPilot.Worker coverage=${worker}% (observe-only Fas 1 — ingen gate)"

          # Global first-party för trend/audit (ej gejtad — per-lager räcker, ADR Avvisat 5).
          line=$(jq -r '.summary.linecoverage' "$summary")
          branch=$(jq -r '.summary.branchcoverage' "$summary")
          method=$(jq -r '.summary.methodcoverage' "$summary")
          echo "INFO first-party totalt: line=${line}% branch=${branch}% method=${method}% (trend/audit)"

          if [[ $fail -ne 0 ]]; then
            echo "Coverage-gate FAILED — se ::error:: ovan (ADR 0044 per-lager-golv)."
            exit 1
          fi
          echo "Coverage-gate PASSED — alla per-lager-golv hållna."

  frontend:
    name: frontend (Next.js 16)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web/jobbpilot-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # pnpm-version pinnad — pnpm-lock.yaml är lockfileVersion 9.0 (pnpm 9.x).
      # När ./web/jobbpilot-web/package.json får `"packageManager": "pnpm@..."`-
      # fält kan version-pinnen härifrån tas bort (action läser då därifrån).
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      # Next.js 16 kräver Node >=20.18. Använd 22 LTS för långt support-fönster.
      # När .nvmrc införs i web/jobbpilot-web: byt till `node-version-file`.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/jobbpilot-web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test (Vitest)
        run: pnpm test

  # ---------------------------------------------------------------------------
  # PERF-/SUPPLY-CHAIN-GOVERNANCE (ADR 0045 — observe-only Fas 1).
  #
  # ALLA tre jobben nedan är OBSERVE-ONLY: de ligger MEDVETET UTANFÖR ci.needs
  # (ci-aggregatet oförändrat: [backend, frontend, coverage]). Coverage-gaten
  # (ADR 0044) är orörd — dessa är rent additiva. continue-on-error + explicit
  # exit 0 → de kan aldrig blockera merge Fas 1. Budget-överskridande/CVE-fynd
  # emitteras som ::warning:: + job-summary, inte som fail.
  #
  # Skäl (CTO roster-gap 2026-05-17 + ADR 0045 Beslut 5): "flaky perf-gate
  # sämre än ingen perf-gate". Delade GitHub-runners = web-verifierat brusig
  # baslinje. Flip observe-only→blockerande (ci.needs-inläggning) = medveten
  # ratchet vid Klas-GO efter stabil distribution (ADR 0045 Beslut 6),
  # ALDRIG en tyst default. Ändra inte detta utan Klas-GO.
  # ---------------------------------------------------------------------------

  # Lighthouse-CI — Core Web Vitals (ADR 0045 Beslut 2). lighthouserc.json
  # kör numberOfRuns:3 + median (single-run = flaky). Jobbet sväljer exit-
  # koden (continue-on-error) → observe-only Fas 1.
  lighthouse:
    name: lighthouse (observe-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: web/jobbpilot-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/jobbpilot-web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # treosh/lighthouse-ci-action — startServerCommand/assertions/budget
      # läses ur web/jobbpilot-web/lighthouserc.json (+ budget.json).
      # Observe-only: jobbets continue-on-error gör att assert-fail aldrig
      # blockerar CI Fas 1; resultatet finns i artefakt + summary.
      - name: Lighthouse CI
        id: lhci
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: web/jobbpilot-web/lighthouserc.json
          uploadArtifacts: true

      - name: Observe-only-not
        if: always()
        run: |
          echo "::notice::Lighthouse-CI observe-only Fas 1 (ADR 0045 Beslut 2/5) — LCP/CLS/page-weight assert-intent, INP/composite observe. Blockerar ej merge; ratchet→blockerande vid Klas-GO (Beslut 6)."

  # Load-test (NBomber) — ADR 0045 Beslut 4. Fas 1: compile-verifierar
  # baslinje-scaffoldet (perf/JobbPilot.LoadTests, utanför sln). Faktiska
  # hot-path-scenarier + runtime-exekvering mot ephemeral API skrivs/wiras
  # av perf-test-writer-agenten (steg 4). Observe-only — exit 0 ovillkorligt.
  loadtest:
    name: loadtest (observe-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # Compile-gate för NBomber-projektet (fångar att paket/projekt bygger).
      # Runtime-exekvering mot ephemeral API kräver docker-compose-stack
      # (Postgres + Redis + Worker + Api). Wiras upp när CI får compose-stöd;
      # tills dess kör vi enbart compile + baseline-runner mot loopback (utan
      # API → connection-refused, men exit 0 hålls via Program.cs).
      - name: Build load-test project
        continue-on-error: true
        run: dotnet build perf/JobbPilot.LoadTests/JobbPilot.LoadTests.csproj -c Release

      # Kör NBomber-runnern i "baseline-only"-läge. Hot-path-scenarier (landing-
      # stats m.fl., klass (a)/(b)/(c)) skrivna av perf-test-writer-agenten kräver
      # ephemeral API + Redis-stack — aktiveras genom att flippa
      # LOADTEST_SCENARIOS=landing-stats när compose-stöd finns i CI.
      - name: Run load-test (baseline-only, observe-only)
        continue-on-error: true
        env:
          LOADTEST_SCENARIOS: baseline-only
          LOADTEST_BASE_URL: http://127.0.0.1:8080
        run: dotnet run --project perf/JobbPilot.LoadTests/JobbPilot.LoadTests.csproj -c Release --no-build

      # Ladda upp NBomber-rapporter + JSON-trend-artefakter. Behövs för
      # Beslut 6-ratchet-utvärderingen (stabil distribution över N runs).
      - name: Upload load-test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: loadtest-reports
          path: |
            loadtest-reports/
            artifacts/perf/
          retention-days: 14
          if-no-files-found: ignore

      - name: Observe-only-not
        if: always()
        run: |
          echo "::notice::Load-test observe-only Fas 1 (ADR 0045 Beslut 4/5). NBomber-projekt compile-verifierat + baseline-runner exekverad. Hot-path-scenarier mot p95-budgetar (Beslut 1) finns implementerade (perf/JobbPilot.LoadTests/Scenarios/) men kräver ephemeral API-stack i CI för runtime-exekvering. Blockerar ej merge; flip→gate = Klas-GO-ratchet (Beslut 6)."

  # Supply-chain audit — ADR 0045 Beslut 4/7. CVE-scan (CI-/Dependabot-formad
  # per security-auditor.md:292). Fail-signal vid High/Critical men OBSERVE-
  # ONLY Fas 1 (exit 0). Dependabot öppnar fix-PRs parallellt. security-
  # auditor behåller manuellt Blocker-veto oförändrat.
  audit:
    name: audit (observe-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/jobbpilot-web/pnpm-lock.yaml

      - name: Restore (NuGet)
        run: dotnet restore JobbPilot.sln

      # dotnet list package --vulnerable: High/Critical → ::warning::, exit 0
      # (observe-only Fas 1, ADR 0045 Beslut 7). Moderate/Low ignoreras
      # medvetet (transitiv dev-brus utan runtime-exponering pre-launch).
      - name: NuGet vulnerability scan (observe-only)
        shell: bash
        run: |
          set -uo pipefail
          out=$(dotnet list JobbPilot.sln package --vulnerable --include-transitive 2>&1 || true)
          echo "$out"
          if echo "$out" | grep -Eiq '\b(High|Critical)\b'; then
            echo "::warning::NuGet High/Critical CVE upptäckt (ADR 0045 Beslut 7, observe-only Fas 1). Dependabot öppnar fix-PR. security-auditor manuellt Blocker-veto kvarstår."
          else
            echo "::notice::Inga NuGet High/Critical-CVE:er (Moderate/Low ignoreras medvetet pre-launch)."
          fi

      - name: Install (pnpm)
        working-directory: web/jobbpilot-web
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (observe-only)
        working-directory: web/jobbpilot-web
        shell: bash
        run: |
          set -uo pipefail
          if pnpm audit --audit-level=high; then
            echo "::notice::pnpm audit: inga High/Critical."
          else
            echo "::warning::pnpm audit High/Critical (ADR 0045 Beslut 7, observe-only Fas 1). Dependabot öppnar fix-PR."
          fi

  # Aggregat-job som kraschar hela CI om något barn-job failed. Gör branch-
  # protection-rules enkla att konfigurera (bara "ci" som required check
  # istället för en check per matrix-cell).
  #
  # ci.needs OFÖRÄNDRAT: [backend, frontend, coverage]. Perf-/audit-jobben
  # (lighthouse/loadtest/audit) är MEDVETET EJ med — observe-only Fas 1
  # (ADR 0045 Beslut 5). Lägg INTE till dem här utan Klas-GO (ratchet,
  # ADR 0045 Beslut 6).
  ci:
    name: ci
    needs: [backend, frontend, coverage]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.backend.result }}" != "success" ]] || \
             [[ "${{ needs.frontend.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
